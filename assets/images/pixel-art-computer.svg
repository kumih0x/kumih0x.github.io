<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Monitor frame (lighter than the surrounding panel so it doesn't blend in) -->
  <rect x="6" y="6" width="52" height="38" fill="#7c6f64"/>
  <rect x="10" y="10" width="44" height="30" fill="#1d2021"/>

  <!-- Screen glow -->
  <rect x="12" y="12" width="40" height="26" fill="#282828"/>

  <!-- Terminal text lines (gruvbox green/orange/yellow) -->
  <rect x="15" y="16" width="14" height="2" fill="#b8bb26"/>
  <rect x="15" y="20" width="22" height="2" fill="#928374"/>
  <rect x="15" y="24" width="10" height="2" fill="#fe8019"/>
  <rect x="15" y="28" width="18" height="2" fill="#928374"/>
  <rect x="15" y="32" width="8" height="2" fill="#fabd2f"/>

  <!-- Blinking cursor block -->
  <rect x="25" y="32" width="3" height="2" fill="#ebdbb2"/>

  <!-- Stand -->
  <rect x="26" y="44" width="12" height="6" fill="#7c6f64"/>
  <rect x="20" y="50" width="24" height="4" fill="#504945"/>

  <!-- Scanline accent -->
  <rect x="10" y="24" width="44" height="1" fill="#fe8019" opacity="0.15"/>
</svg>
