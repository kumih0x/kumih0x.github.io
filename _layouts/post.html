---
layout: default
---

<article class="post">
  <div class="post-meta">
    <span class="post-date">{{ page.date | date: "%Y-%m-%d" }}</span>
  </div>

  <h1>{{ page.title }}</h1>

  <div class="tags">
    {% for tag in page.tags %}
      <a href="/?tag={{ tag | url_encode }}" class="tag" data-tag="{{ tag }}">{{ tag }}</a>
    {% endfor %}
  </div>

  <div class="post-content">
    {{ content }}
  </div>

  <a href="/" class="older-posts">← Back to all posts</a>
</article>
