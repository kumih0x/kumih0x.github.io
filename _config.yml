title: kumih0x — Security Research Blog
tagline: Malware reverse engineering, threat hunting & low-level research notes
description: >-
  Welcome to my research blog, where I explore the ever-evolving world of malware analysis and threat intelligence.
  As a malware analyst and threat intelligence researcher, I dissect the latest cyber threats, analyze malicious code,
  and uncover adversary tactics to help strengthen cybersecurity defenses.
  Here, you'll find deep dives into malware families, threat actor activities,
  reverse engineering techniques, and insights into the latest trends in the cybersecurity landscape.
baseurl: ""
url: "https://kumih0x.github.io"

author: kumih0x
twitter_username: kumih0x
github_username: kumih0x

markdown: kramdown
highlighter: rouge

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      image:
        path: /assets/images/kum1h0x.png
        alt: "kum1h0x — pixel-fox mascot logo"

sass:
  sass_dir: _sass
  style: compressed
